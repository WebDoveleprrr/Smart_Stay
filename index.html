<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Stay — Premium Living</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --error: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* Premium gradient + image */
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.6), rgba(59, 130, 246, 0.4)), url('aryabhatta.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #f8fafc;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 40px 32px;
      transition: all 0.4s ease;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .brand-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    
    .brand-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    
    .brand-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .row {
      display: flex;
      gap: 16px;
    }
    
    .row .form-group { flex: 1; margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    
    .input-icon-wrap {
      position: relative;
    }
    
    .input-icon-wrap span.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 12px 14px 12px 42px; /* Extra padding-left for icon */
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 10px;
      outline: none;
      transition: all 0.3s ease;
    }
    input:focus {
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.6);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }
    input::placeholder { color: #64748b; }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #94a3b8;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      padding: 0;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: #f8fafc; }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #3b82f6, #2563eb);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      margin-top: 8px;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }
    .btn:disabled {
      background: #475569;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }
    .auth-footer span {
      color: #60a5fa;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }
    .auth-footer span:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .view-section.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Messages */
    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    .msg.error {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .msg.success {
      background: rgba(16, 185, 129, 0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .msg.show { display: block; }
    
    .otp-area { display: none; text-align: center; }
    .otp-area.show { display: block; }
    .timer { font-size: 1.75rem; font-weight: 700; color: #f8fafc; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
    
    .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; line-height: 1.4; }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="auth-header">
      <div class="brand-icon">🏨</div>
      <div class="brand-title">Smart Stay</div>
      <div class="brand-subtitle">Premium Hostel Management</div>
    </div>

    <!-- LOGIN -->
    <div class="view-section active" id="loginView">
        <div class="msg" id="loginMsg"></div>
        <div id="loginStep1">
           <div class="form-group">
              <label>Email Address</label>
              <div class="input-icon-wrap">
                 <span class="icon">✉️</span>
                 <input type="email" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()"/>
              </div>
           </div>
           <div class="form-group">
              <label>Password</label>
              <div class="input-icon-wrap">
                 <span class="icon">🔒</span>
                 <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
                 <button type="button" class="pw-toggle" onclick="togglePwd('loginPassword',this)">👁</button>
              </div>
           </div>
           <button class="btn" onclick="doLogin()">Sign In</button>
        </div>

        <div class="otp-area" id="loginStep2">
           <p style="font-size:0.9rem; color:#cbd5e1; margin-bottom:12px">Enter the 6-digit code sent to your email.</p>
           <div class="timer" id="timer">5:00</div>
           <div class="form-group">
              <input type="text" id="otpInput" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:8px; font-size:1.5rem; font-weight:600; padding:12px 14px;" onkeydown="if(event.key==='Enter') doVerifyOTP()" />
           </div>
           <button class="btn" id="verifyBtn" onclick="doVerifyOTP()">Verify Token</button>
           <button class="btn btn-outline" id="resendBtn" disabled onclick="resendOTP()" style="margin-top: 12px;">Resend OTP</button>
        </div>

        <div class="auth-footer" id="loginFooter">
          Don't have an account? <span onclick="switchView('register')">Register here</span>
        </div>
    </div>

    <!-- REGISTER -->
    <div class="view-section" id="registerView">
        <div class="msg" id="regMsg"></div>
        
        <div class="form-group">
           <label>Full Name</label>
           <div class="input-icon-wrap">
              <span class="icon">👤</span>
              <input type="text" id="regName" placeholder="John Doe" onkeydown="if(event.key==='Enter') document.getElementById('regEmail').focus()"/>
           </div>
        </div>
        
        <div class="form-group">
           <label>Email Address</label>
           <div class="input-icon-wrap">
              <span class="icon">✉️</span>
              <input type="email" id="regEmail" placeholder="user@hostel.edu" onkeydown="if(event.key==='Enter') document.getElementById('regPassword').focus()"/>
           </div>
        </div>
        
        <div class="form-group">
           <label>Password</label>
           <div class="input-icon-wrap">
              <span class="icon">🔒</span>
              <input type="password" id="regPassword" placeholder="Min 8 characters" onkeydown="if(event.key==='Enter') document.getElementById('regBlock').focus()"/>
              <button type="button" class="pw-toggle" onclick="togglePwd('regPassword',this)">👁</button>
           </div>
           <div class="hint">Must contain uppercase, lowercase, number, and special character.</div>
        </div>
        
        <div class="row">
           <div class="form-group" style="margin-bottom:0;">
              <label>Block</label>
              <div class="input-icon-wrap">
                 <span class="icon">🏢</span>
                 <input type="text" id="regBlock" placeholder="e.g. A" onkeydown="if(event.key==='Enter') document.getElementById('regRoom').focus()"/>
              </div>
           </div>
           <div class="form-group" style="margin-bottom:0;">
              <label>Room</label>
              <div class="input-icon-wrap">
                 <span class="icon">🔑</span>
                 <input type="text" id="regRoom" placeholder="204" onkeydown="if(event.key==='Enter') document.getElementById('regPhone').focus()"/>
              </div>
           </div>
        </div>
        
        <div class="form-group" style="margin-top:20px;">
           <label>Phone Number</label>
           <div class="input-icon-wrap">
              <span class="icon">📱</span>
              <input type="tel" id="regPhone" placeholder="+91 9000000000" onkeydown="if(event.key==='Enter') doRegister()"/>
           </div>
        </div>

        <button class="btn" onclick="doRegister()">Create Account</button>

        <div class="auth-footer">
          Already have an account? <span onclick="switchView('login')">Sign In</span>
        </div>
    </div>

  </div>

  <script>
    // Session check
    fetch('https://smart-stay-0gxx.onrender.com/api/session', { credentials: 'include' })
      .then(r => r.json())
      .then(d => {
        if (d.loggedIn) window.location.href = d.role === 'admin' ? '/admin.html' : '/dashboard.html';
      });

    function switchView(v) {
      document.getElementById('loginView').classList.remove('active');
      document.getElementById('registerView').classList.remove('active');
      
      if (v === 'login') {
        document.getElementById('loginView').classList.add('active');
      } else {
        document.getElementById('registerView').classList.add('active');
      }
      hideMsg();
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type} show`;
    }

    function hideMsg() {
      document.getElementById('loginMsg').classList.remove('show');
      document.getElementById('regMsg').classList.remove('show');
    }

    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const block = document.getElementById('regBlock').value.trim();
      const room = document.getElementById('regRoom').value.trim();
      const phone = document.getElementById('regPhone').value.trim();

      if (!name || !email || !password) return showMsg('regMsg', 'Name, email and password are required', 'error');

      showMsg('regMsg', 'Creating account...', 'success');
      const payload = { name, email, password, block, room, phone };

      try {
        const res = await fetch('https://smart-stay-0gxx.onrender.com/api/register', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const d = await res.json();
        if (d.error) showMsg('regMsg', d.error, 'error');
        else {
          showMsg('regMsg', 'Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => switchView('login'), 2000);
        }
      } catch (e) {
        showMsg('regMsg', 'Network error.', 'error');
      }
    }

    let otpTimerInterval;

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showMsg('loginMsg', 'Credentials required', 'error');

      showMsg('loginMsg', 'Authenticating...', 'success');

      try {
        const res = await fetch('https://smart-stay-0gxx.onrender.com/api/login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const d = await res.json();
        if (d.error) {
          showMsg('loginMsg', d.error, 'error');
        } else if (d.role === 'admin') {
          showMsg('loginMsg', 'Admin login successful. Redirecting...', 'success');
          setTimeout(() => window.location.href = '/admin.html', 800);
        } else {
          showMsg('loginMsg', 'OTP sent to your email.', 'success');
          document.getElementById('loginStep1').style.display = 'none';
          document.getElementById('loginFooter').style.display = 'none';
          document.getElementById('loginStep2').classList.add('show');
          startOtpTimer();
        }
      } catch (e) {
        showMsg('loginMsg', 'Network error.', 'error');
      }
    }

    async function doVerifyOTP() {
      const otp = document.getElementById('otpInput').value.trim();
      if (!otp) return showMsg('loginMsg', 'OTP required', 'error');

      showMsg('loginMsg', 'Verifying...', 'success');
      try {
        const res = await fetch('https://smart-stay-0gxx.onrender.com/api/verify-otp', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp })
        });
        const d = await res.json();
        if (d.error) showMsg('loginMsg', d.error, 'error');
        else {
          showMsg('loginMsg', 'Access granted. Redirecting...', 'success');
          setTimeout(() => window.location.href = '/dashboard.html', 800);
        }
      } catch (e) {
        showMsg('loginMsg', 'Network error', 'error');
      }
    }

    function startOtpTimer() {
      document.getElementById("resendBtn").disabled = true;
      document.getElementById("verifyBtn").disabled = false;
      if (otpTimerInterval) clearInterval(otpTimerInterval);

      let time = 300; // 5 mins
      const el = document.getElementById("timer");

      otpTimerInterval = setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        el.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        time--;

        if (time < 0) {
          clearInterval(otpTimerInterval);
          el.innerText = "OTP Expired";
          document.getElementById("verifyBtn").disabled = true;
          document.getElementById("resendBtn").disabled = false;
        }
      }, 1000);
    }

    function resendOTP() {
      document.getElementById("resendBtn").disabled = true;
      showMsg('loginMsg', 'Resending OTP...', 'success');

      fetch('https://smart-stay-0gxx.onrender.com/api/resend-otp', {
        method: 'POST', credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            showMsg('loginMsg', data.error, 'error');
            document.getElementById("resendBtn").disabled = false;
          } else {
            showMsg('loginMsg', 'New OTP sent to your email.', 'success');
            startOtpTimer();
          }
        })
        .catch(e => {
          showMsg('loginMsg', 'Network error', 'error');
          document.getElementById("resendBtn").disabled = false;
        });
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
</body>

</html>
