<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Stay — Loading...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #F3E6D3, #EAD7C0);
      font-family: 'Inter', sans-serif;
      color: #2C2A28;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid #3B82A6;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <div class="loading-text">Loading Smart Stay...</div>

  <script>
    // Ping backend to wake it up
    fetch('https://smart-stay-0gxx.onrender.com/api/session', { credentials: 'include' })
      .then(response => {
         // Optionally do check here, but setTimeout handles redirect regardless
      })
      .catch(err => console.log('Waking up backend...', err));

    setTimeout(() => {
      window.location.href = "/dashboard.html";
    }, 2000);
  </script>
</body>
</html>
