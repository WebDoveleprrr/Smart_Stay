<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Stay — Premium Living</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #111827;
      --primary-hover: #1f2937;
      --error: #b91c1c;
      --success: #15803d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      color: #1f2937;
      overflow-x: hidden;
    }

    .login-container {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .login-left {
      flex: 1;
      background: url('/images/aryabhatta.jpg') center/cover no-repeat;
    }

    .login-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: #F3E6D3;
    }

    .login-card {
      width: 100%;
      max-width: 480px;
      background: #FFFFFF;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
    }

    .auth-header,
    .view-section {
      width: 100%;
    }

    .auth-header {
      text-align: left;
      margin-bottom: 32px;
    }

    .brand-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      color: #111827;
      line-height: 1;
    }

    .brand-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: #2C2A28;
    }

    .brand-subtitle {
      font-size: 0.95rem;
      color: #6F6A63;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .form-group {
      flex: 1;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap span.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: #FFFDF9;
      border: 1px solid #E6D8C3;
      color: #2C2A28;
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #D6BFA7;
      background: #FFFDF9;
      box-shadow: 0 0 0 3px rgba(214, 191, 167, 0.25);
    }

    input::placeholder {
      color: #A89F94;
    }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #94a3b8;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      padding: 0;
      transition: color 0.2s;
    }

    .pw-toggle:hover {
      color: #475569;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1E293B, #334155);
      color: #F9FAFB;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-top: 8px;
    }

    .btn:hover {
      background: linear-gradient(135deg, #334155, #475569);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .btn:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      box-shadow: none;
    }

    .btn-outline:hover {
      background: #f1f5f9;
      box-shadow: none;
    }

    .auth-footer {
      text-align: left;
      margin-top: 24px;
      font-size: 0.9rem;
      color: #64748b;
    }

    .auth-footer span {
      color: #111827;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
    }

    .auth-footer span:hover {
      text-decoration: underline;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Messages */
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }

    .msg.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .msg.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .msg.show {
      display: block;
    }

    .otp-area {
      display: none;
      text-align: left;
    }

    .otp-area.active {
      display: block;
    }

    .otp-area p {
      color: #64748b !important;
    }

    .timer {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827 !important;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 8px;
      line-height: 1.4;
    }

    @media(max-width: 768px) {
      body {
        flex-direction: column;
      }

      .login-left {
        width: 100%;
        padding: 40px 6%;
        min-height: auto;
      }

      .login-card {
        padding: 24px;
      }


    }
  </style>
</head>

<body>

  <div class="login-container">
  <div class="login-right">
    <div class="login-card">
      <div class="auth-header">
        <div class="brand-icon">🏨</div>
        <div class="brand-title">Smart Stay</div>
        <div class="brand-subtitle">Premium Hostel Management</div>
      </div>

      <!-- LOGIN -->
      <div class="view-section active" id="loginView">
        <div class="msg" id="loginMsg"></div>
        <div id="loginStep1">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-icon-wrap">
              <span class="icon">✉️</span>
              <input type="email" id="loginEmail" placeholder="your@email.com"
                onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()" />
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-icon-wrap">
              <span class="icon">🔒</span>
              <input type="password" id="loginPassword" placeholder="••••••••"
                onkeydown="if(event.key==='Enter') doLogin()" />
              <button type="button" class="pw-toggle" onclick="togglePwd('loginPassword',this)">👁</button>
            </div>
          </div>
          <button class="btn" onclick="doLogin()">Sign In</button>
        </div>

        <div class="otp-area" id="loginStep2">
          <p style="font-size:0.9rem; color:#cbd5e1; margin-bottom:12px">Enter the 6-digit code sent to your email.</p>
          <div class="timer" id="timer">5:00</div>
          <div class="form-group">
            <input type="text" id="otpInput" placeholder="000000" maxlength="6"
              style="text-align:center; letter-spacing:8px; font-size:1.5rem; font-weight:600; padding:12px 14px;"
              onkeydown="if(event.key==='Enter') doVerifyOTP()" />
          </div>
          <button class="btn" id="verifyBtn" onclick="doVerifyOTP()">Verify Token</button>
          <button class="btn btn-outline" id="resendBtn" disabled onclick="resendOTP()" style="margin-top: 12px;">Resend
            OTP</button>
        </div>

        <div class="auth-footer" id="loginFooter">
          Don't have an account? <span onclick="switchView('register')">Register here</span>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="view-section" id="registerView">
        <div class="msg" id="regMsg"></div>

        <div class="form-group">
          <label>Full Name</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input type="text" id="regName" placeholder="John Doe"
              onkeydown="if(event.key==='Enter') document.getElementById('regEmail').focus()" />
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-icon-wrap">
            <span class="icon">✉️</span>
            <input type="email" id="regEmail" placeholder="user@hostel.edu"
              onkeydown="if(event.key==='Enter') document.getElementById('regPassword').focus()" />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="regPassword" placeholder="Min 8 characters"
              onkeydown="if(event.key==='Enter') document.getElementById('regBlock').focus()" />
            <button type="button" class="pw-toggle" onclick="togglePwd('regPassword',this)">👁</button>
          </div>
          <div class="hint">Must contain uppercase, lowercase, number, and special character.</div>
        </div>

        <div class="row">
          <div class="form-group" style="margin-bottom:0;">
            <label>Block</label>
            <div class="input-icon-wrap">
              <span class="icon">🏢</span>
              <input type="text" id="regBlock" placeholder="e.g. A"
                onkeydown="if(event.key==='Enter') document.getElementById('regRoom').focus()" />
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>Room</label>
            <div class="input-icon-wrap">
              <span class="icon">🔑</span>
              <input type="text" id="regRoom" placeholder="204"
                onkeydown="if(event.key==='Enter') document.getElementById('regPhone').focus()" />
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top:20px;">
          <label>Phone Number</label>
          <div class="input-icon-wrap">
            <span class="icon">📱</span>
            <input type="tel" id="regPhone" placeholder="+91 9000000000"
              onkeydown="if(event.key==='Enter') doRegister()" />
          </div>
        </div>

        <button class="btn" onclick="doRegister()">Create Account</button>

        <div class="auth-footer">
          Already have an account? <span onclick="switchView('login')">Sign In</span>
        </div>
      </div>
    </div>
  </div>
  <div class="login-left"></div>
</div>

  <script>
    // Session check
    fetch('/api/session', { credentials: 'include' })
      .then(r => r.json())
      .then(d => {
        if (d.loggedIn) window.location.href = d.role === 'admin' ? '/admin.html' : '/dashboard.html';
      });

    function switchView(v) {
      document.getElementById('loginView').classList.remove('active');
      document.getElementById('registerView').classList.remove('active');

      if (v === 'login') {
        document.getElementById('loginView').classList.add('active');
      } else {
        document.getElementById('registerView').classList.add('active');
      }
      hideMsg();
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type} show`;
    }

    function hideMsg() {
      document.getElementById('loginMsg').classList.remove('show');
      document.getElementById('regMsg').classList.remove('show');
    }

    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const block = document.getElementById('regBlock').value.trim();
      const room = document.getElementById('regRoom').value.trim();
      const phone = document.getElementById('regPhone').value.trim();

      if (!name || !email || !password) return showMsg('regMsg', 'Name, email and password are required', 'error');

      showMsg('regMsg', 'Creating account...', 'success');
      const payload = { name, email, password, block, room, phone };

      try {
        const res = await fetch('/api/register', { credentials: 'include', 
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const d = await res.json();
        if (d.error) showMsg('regMsg', d.error, 'error');
        else {
          showMsg('regMsg', 'Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => switchView('login'), 2000);
        }
      } catch (e) {
        showMsg('regMsg', 'Network error.', 'error');
      }
    }

    let otpTimerInterval;

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showMsg('loginMsg', 'Credentials required', 'error');

      showMsg('loginMsg', 'Authenticating...', 'success');

      try {
        const res = await fetch('/api/login', { credentials: 'include', 
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const d = await res.json();
        if (d.error) {
          showMsg('loginMsg', d.error, 'error');
        } else if (d.role === 'admin') {
          showMsg('loginMsg', 'Admin login successful. Redirecting...', 'success');
          setTimeout(() => window.location.href = '/admin.html', 800);
        } else {
          showMsg('loginMsg', 'OTP sent to your email.', 'success');
          document.getElementById('loginStep1').style.display = 'none';
          document.getElementById('loginFooter').style.display = 'none';
          document.getElementById('loginStep2').classList.add('active');
          startOtpTimer();
        }
      } catch (e) {
        showMsg('loginMsg', 'Network error.', 'error');
      }
    }

    async function doVerifyOTP() {
      const otp = document.getElementById('otpInput').value.trim();
      if (!otp) return showMsg('loginMsg', 'OTP required', 'error');

      showMsg('loginMsg', 'Verifying...', 'success');
      try {
        const res = await fetch('/api/verify-otp', { credentials: 'include', 
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp })
        });
        const d = await res.json();
        if (d.error) showMsg('loginMsg', d.error, 'error');
        else {
          showMsg('loginMsg', 'Access granted. Redirecting...', 'success');
          setTimeout(() => window.location.href = '/dashboard.html', 800);
        }
      } catch (e) {
        showMsg('loginMsg', 'Network error', 'error');
      }
    }

    function startOtpTimer() {
      document.getElementById("resendBtn").disabled = true;
      document.getElementById("verifyBtn").disabled = false;
      if (otpTimerInterval) clearInterval(otpTimerInterval);

      let time = 300; // 5 mins
      const el = document.getElementById("timer");

      otpTimerInterval = setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        el.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        time--;

        if (time < 0) {
          clearInterval(otpTimerInterval);
          el.innerText = "OTP Expired";
          document.getElementById("verifyBtn").disabled = true;
          document.getElementById("resendBtn").disabled = false;
        }
      }, 1000);
    }

    function resendOTP() {
      document.getElementById("resendBtn").disabled = true;
      showMsg('loginMsg', 'Resending OTP...', 'success');

      fetch('/api/resend-otp', { credentials: 'include', 
        method: 'POST', credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            showMsg('loginMsg', data.error, 'error');
            document.getElementById("resendBtn").disabled = false;
          } else {
            showMsg('loginMsg', 'New OTP sent to your email.', 'success');
            startOtpTimer();
          }
        })
        .catch(e => {
          showMsg('loginMsg', 'Network error', 'error');
          document.getElementById("resendBtn").disabled = false;
        });
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
</body>

</html>
